services:
  redis:
    image: redis:7-alpine
    container_name: accord-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - accord_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: 512m
    cpus: "0.50"
    pids_limit: 256
    restart: unless-stopped

  backend:
    # Use pre-built image from Docker Hub in CI/CD, or build locally
    image: ${ACCORD_BACKEND_IMAGE:-accord-backend:latest}
    build:
      context: ./cloud-backend
    container_name: accord-backend
    environment:
      ACCORD_DEPLOYMENT_MODE: ${ACCORD_DEPLOYMENT_MODE:-cloud}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8000}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3000}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/ledger.db}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      ACCORD_REDIS_URL: ${ACCORD_REDIS_URL:-redis://redis:6379/0}
      ACCORD_BIOMETRIC_SECRET: ${ACCORD_BIOMETRIC_SECRET:-change-this-in-production}
      ACCORD_SSE_TOKEN_SECRET: ${ACCORD_SSE_TOKEN_SECRET:-change-this-in-production}
      ACCORD_SSE_TOKEN_TTL_SECONDS: ${ACCORD_SSE_TOKEN_TTL_SECONDS:-3600}
      ACCORD_SMTP_HOST: ${ACCORD_SMTP_HOST:-}
      ACCORD_SMTP_PORT: ${ACCORD_SMTP_PORT:-587}
      ACCORD_SMTP_USERNAME: ${ACCORD_SMTP_USERNAME:-}
      ACCORD_SMTP_PASSWORD: ${ACCORD_SMTP_PASSWORD:-}
      ACCORD_SMTP_FROM: ${ACCORD_SMTP_FROM:-no-reply@accord.local}
      ACCORD_SMTP_USE_TLS: ${ACCORD_SMTP_USE_TLS:-true}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    ports:
      - "8000:8000"
    volumes:
      - ./cloud-backend:/app
      - accord_backend_data:/app/data
    mem_limit: 2g
    cpus: "1.50"
    pids_limit: 512
    restart: unless-stopped

  frontend:
    # Use pre-built image from Docker Hub in CI/CD, or build locally
    image: ${ACCORD_FRONTEND_IMAGE:-accord-frontend:latest}
    build:
      context: ./friday-insights
    container_name: accord-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "3000:80"
    mem_limit: 512m
    cpus: "0.50"
    pids_limit: 256
    restart: unless-stopped

volumes:
  accord_redis_data:
  accord_backend_data:
