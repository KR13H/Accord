apiVersion: v1
kind: ConfigMap
metadata:
  name: accord-config
  namespace: accord
data:
  DATABASE_URL: postgresql://accord:accord@accord-postgres:5432/accord
  REDIS_URL: redis://accord-redis:6379/0
  CELERY_BROKER_URL: redis://accord-redis:6379/0
  CELERY_RESULT_BACKEND: redis://accord-redis:6379/1
  ACCORD_STORAGE_BACKEND: s3
  ACCORD_S3_REGION: ap-south-1
  CORS_ALLOW_ORIGINS: https://app.accord.example
