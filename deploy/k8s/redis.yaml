apiVersion: apps/v1
kind: Deployment
metadata:
  name: accord-redis
  namespace: accord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accord-redis
  template:
    metadata:
      labels:
        app: accord-redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: accord-redis
  namespace: accord
spec:
  selector:
    app: accord-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
