apiVersion: apps/v1
kind: Deployment
metadata:
  name: accord-frontend
  namespace: accord
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accord-frontend
  template:
    metadata:
      labels:
        app: accord-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/kr13h/accord-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: accord-frontend
  namespace: accord
spec:
  selector:
    app: accord-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
