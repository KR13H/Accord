apiVersion: apps/v1
kind: Deployment
metadata:
  name: accord-postgres
  namespace: accord
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accord-postgres
  template:
    metadata:
      labels:
        app: accord-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        env:
        - name: POSTGRES_USER
          value: accord
        - name: POSTGRES_PASSWORD
          value: accord
        - name: POSTGRES_DB
          value: accord
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: accord-postgres
  namespace: accord
spec:
  selector:
    app: accord-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
