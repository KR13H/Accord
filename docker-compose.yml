services:
  postgres:
    image: postgres:16
    container_name: accord-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accord}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accord}
      POSTGRES_DB: ${POSTGRES_DB:-accord}
    ports:
      - "5432:5432"
    volumes:
      - accord_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: accord-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: accord-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/ledger.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      ACCORD_STORAGE_BACKEND: ${ACCORD_STORAGE_BACKEND:-local}
      ACCORD_S3_BUCKET: ${ACCORD_S3_BUCKET}
      ACCORD_S3_REGION: ${ACCORD_S3_REGION:-ap-south-1}
      ACCORD_S3_ENDPOINT_URL: ${ACCORD_S3_ENDPOINT_URL}
      ACCORD_BACKUP_ENCRYPTION_KEY: ${ACCORD_BACKUP_ENCRYPTION_KEY}
      ACCORD_BACKUP_DIR: ${ACCORD_BACKUP_DIR:-/app/backups}
      ACCORD_BACKUP_RETENTION_DAYS: ${ACCORD_BACKUP_RETENTION_DAYS:-7}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      ACCORD_BIOMETRIC_SECRET: ${ACCORD_BIOMETRIC_SECRET:-change-this-in-production}
      ACCORD_SSE_TOKEN_SECRET: ${ACCORD_SSE_TOKEN_SECRET:-change-this-in-production}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      ACCORD_SMTP_HOST: ${ACCORD_SMTP_HOST}
      ACCORD_SMTP_PORT: ${ACCORD_SMTP_PORT}
      ACCORD_SMTP_USERNAME: ${ACCORD_SMTP_USERNAME}
      ACCORD_SMTP_PASSWORD: ${ACCORD_SMTP_PASSWORD}
      ACCORD_SMTP_FROM: ${ACCORD_SMTP_FROM}
      ACCORD_SMTP_USE_TLS: ${ACCORD_SMTP_USE_TLS}
    ports:
      - "8000:8000"
    volumes:
      - accord_backend_db:/app/data
      - accord_backend_backups:/app/backups
    restart: unless-stopped
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: accord-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  accord_backend_db:
  accord_backend_backups:
  accord_postgres_data:
