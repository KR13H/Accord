name: Accord CI

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cloud-backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run backend tests
        run: pytest -q

  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: friday-insights/package-lock.json

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: cloud-backend/requirements.txt

      - name: Install backend dependencies for Cypress API server
        working-directory: cloud-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: friday-insights
        run: npm install

      - name: Start backend API server
        run: |
          cd cloud-backend
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &

      - name: Run Cypress critical path
        uses: cypress-io/github-action@v6
        with:
          working-directory: friday-insights
          install: false
          browser: electron
          spec: cypress/e2e/rera_flow.cy.js
          start: npm run dev -- --host 127.0.0.1 --port 3000
          wait-on: |
            http://127.0.0.1:8000/api/v1/health
            http://127.0.0.1:3000
          wait-on-timeout: 180
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000/api/v1
          DATABASE_URL: sqlite:////tmp/accord-ci.db

  build-docker:
    name: build-docker
    runs-on: ubuntu-latest
    needs:
      - test-backend
      - test-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker-compose images
        run: docker compose -f docker-compose.yml build